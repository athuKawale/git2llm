filter:
  exclude_merge_commits: true
  exclude_bot_authors: true
  exclude_binary_only: true
  exclude_revert_commits: true
  
  min_commit_message_words: 3
  max_commit_message_chars: 1000
  min_diff_lines: 3
  max_diff_lines: 1000
  max_files_changed: 30
  min_files_changed: 1
  
  min_content_score: 0.2
  min_alignment_score: 0.0
  require_verb_start: false
  exclude_wip_messages: false
  
  dedup_method: "exact"
  dedup_threshold: 0.95
  
  min_pr_body_words: 5
  require_linked_issue: false
  min_issue_to_patch_words: 5

collection:
  max_commits_per_repo: 150
  max_prs_per_repo: 25
  since: 2026-01-01
  branches: ["main"]

output_format: "sharegpt"
task: "all"
